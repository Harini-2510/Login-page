<!DOCTYPE html>
<html>
<head>
    <title>Login UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Welcome Back!</h1>
        <p>Login to continue your journey 🚀</p>
    </div>

    <div class="right">
        <div class="form-box">
            <h2>Login</h2>

            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">

            <button>Login</button>
        </div>
    </div>

</div>

</body>
</html>
